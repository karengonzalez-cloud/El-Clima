<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clima Neo • Karen Annelys Gonzalez Ramirez</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="min-vh-100 d-flex flex-column" style="background: linear-gradient(135deg, #1a0033 0%, #000022 100%); color: #fff;">
    
    <nav class="navbar navbar-expand-lg navbar-dark py-3">
      <div class="container">
        <h1 class="navbar-brand fs-3 fw-bold neon-text">
          🌌 Clima Neo • Karen Annelys Gonzalez Ramirez
        </h1>
      </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center py-5">
      <div class="container">
        
        <div class="row justify-content-center mb-5">
          <div class="col-lg-7 col-xl-5">
            <div class="input-group input-group-lg shadow-neon">
              <input 
                type="text" 
                id="cityInput" 
                class="form-control bg-transparent text-white border-0 ps-4 fs-5" 
                placeholder="¿Qué ciudad quieres ver? (ej: Santo Domingo)">
              <button id="searchBtn" class="btn btn-outline-light px-4">🔎 Buscar</button>
            </div>
            <div class="text-center mt-3">
              <button id="locationBtn" class="btn btn-outline-info fw-semibold">
                📍 Usar mi ubicación actual
              </button>
            </div>
          </div>
        </div>

        <div id="weatherDisplay" class="d-none">
          <div class="glass-card mx-auto" style="max-width: 820px;">
            <div class="card-body p-5 position-relative">
              <button id="closeBtn" class="btn-close btn-close-white position-absolute top-0 end-0 m-4" aria-label="Cerrar"></button>
              
              <div class="text-center">
                <h2 id="cityName" class="display-4 fw-bold mb-1"></h2>
                <p id="description" class="lead mb-4"></p>
                
                <div class="d-flex align-items-center justify-content-center gap-4 flex-wrap">
                  <img id="weatherIcon" src="" alt="icono" class="weather-icon">
                  <div>
                    <h1 id="temperature" class="display-1 fw-bold mb-0"></h1>
                    <span class="fs-2">°C</span>
                  </div>
                </div>
              </div>

              <div class="row g-4 mt-5">
                <div class="col-6 col-md-3">
                  <div class="detail-glass text-center p-3 rounded-4">
                    <p class="mb-1 text-cyan">Sensación térmica</p>
                    <h4 id="feelsLike" class="fw-bold"></h4>
                  </div>
                </div>
                <div class="col-6 col-md-3">
                  <div class="detail-glass text-center p-3 rounded-4">
                    <p class="mb-1 text-cyan">Humedad</p>
                    <h4 id="humidity" class="fw-bold"></h4>
                  </div>
                </div>
                <div class="col-6 col-md-3">
                  <div class="detail-glass text-center p-3 rounded-4">
                    <p class="mb-1 text-cyan">Viento</p>
                    <h4 id="wind" class="fw-bold"></h4>
                  </div>
                </div>
                <div class="col-6 col-md-3">
                  <div class="detail-glass text-center p-3 rounded-4">
                    <p class="mb-1 text-cyan">Presión</p>
                    <h4 id="pressure" class="fw-bold"></h4>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="text-center py-4 text-white-50 small">
      Desarrollado con ❤️ por Karen Annelys Gonzalez Ramirez • 2026
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
